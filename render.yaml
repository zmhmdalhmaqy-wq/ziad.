services:
  - type: web
    name: ziad-host
    runtime: python
    repo: https://github.com/yourusername/ziad-host
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 5000
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app